<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .title { font: 700 28px Georgia, serif; fill: #111827; }
    .cellhead { font: 700 24px Georgia, serif; fill: #111827; }
    .body { font: 400 20px Georgia, serif; fill: #374151; }
    .caption { font: 400 18px Georgia, serif; fill: #4b5563; }
    .small { font: 400 17px Georgia, serif; fill: #4b5563; }
    .frame { fill: #ffffff; stroke: #111827; stroke-width: 3; }
    .line { stroke: #111827; stroke-width: 2.5; }
    .shade1 { fill: #f8fafc; }
    .shade2 { fill: #f1f5f9; }
  </style>

  <rect x="60" y="70" width="1080" height="560" class="frame"/>
  <rect x="60" y="70" width="540" height="280" class="shade1"/>
  <rect x="600" y="70" width="540" height="280" class="shade2"/>
  <rect x="60" y="350" width="540" height="280" class="shade2"/>
  <rect x="600" y="350" width="540" height="280" class="shade1"/>

  <line x1="600" y1="70" x2="600" y2="630" class="line"/>
  <line x1="60" y1="350" x2="1140" y2="350" class="line"/>

  <text x="90" y="120" class="cellhead">Thinking Humanly</text>
  <text x="90" y="165" class="body">Making machines think in ways associated with human thought,</text>
  <text x="90" y="198" class="body">such as learning, problem solving, and decision-making.</text>

  <text x="630" y="120" class="cellhead">Thinking Rationally</text>
  <text x="630" y="165" class="body">Studying the computations that make it possible to perceive,</text>
  <text x="630" y="198" class="body">reason, and act according to principled models of intelligence.</text>

  <text x="90" y="400" class="cellhead">Acting Humanly</text>
  <text x="90" y="445" class="body">Building machines that behave in ways that appear intelligent</text>
  <text x="90" y="478" class="body">when compared with how people would perform the same tasks.</text>

  <text x="630" y="400" class="cellhead">Acting Rationally</text>
  <text x="630" y="445" class="body">Designing intelligent agents that choose actions expected</text>
  <text x="630" y="478" class="body">to achieve good outcomes given what they perceive and know.</text>

  <text x="60" y="42" class="title">Four Classical Approaches to Artificial Intelligence</text>
  <text x="60" y="685" class="caption">Adapted from Russell and Norvig, <tspan font-style="italic">Artificial Intelligence: A Modern Approach</tspan> (3rd ed.).</text>
  <text x="60" y="715" class="small">This simplified version is redrawn for explanatory use in a blog post.</text>
</svg>
