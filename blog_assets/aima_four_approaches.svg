<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Four Classical Approaches to Artificial Intelligence</title>
  <desc id="desc">A four-quadrant diagram summarizing Thinking Humanly, Thinking Rationally, Acting Humanly, and Acting Rationally.</desc>

  <rect width="1200" height="760" rx="28" fill="#FFFDF8"/>
  <rect x="34" y="34" width="1132" height="692" rx="22" fill="#FFFCF5" stroke="#D8CFC0" stroke-width="2"/>

  <text x="82" y="108" fill="#161311" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700">
    Four Classical Approaches to Artificial Intelligence
  </text>

  <rect x="82" y="146" width="504" height="250" fill="#F7F1E5" stroke="#3B342C" stroke-width="2"/>
  <rect x="586" y="146" width="504" height="250" fill="#F2F6FA" stroke="#3B342C" stroke-width="2"/>
  <rect x="82" y="396" width="504" height="250" fill="#F8F3EA" stroke="#3B342C" stroke-width="2"/>
  <rect x="586" y="396" width="504" height="250" fill="#F7F4EE" stroke="#3B342C" stroke-width="2"/>

  <g fill="#171412" font-family="Georgia, 'Times New Roman', serif">
    <text x="112" y="196" font-size="24" font-weight="700">Thinking Humanly</text>
    <text x="112" y="244" font-size="16" font-weight="400">
      <tspan x="112" dy="0">Making machines think in ways associated</tspan>
      <tspan x="112" dy="30">with human thought, such as learning,</tspan>
      <tspan x="112" dy="30">problem solving, and decision-making.</tspan>
    </text>

    <text x="616" y="196" font-size="24" font-weight="700">Thinking Rationally</text>
    <text x="616" y="244" font-size="16" font-weight="400">
      <tspan x="616" dy="0">Studying the computations that make it</tspan>
      <tspan x="616" dy="30">possible to perceive, reason, and act</tspan>
      <tspan x="616" dy="30">according to principled models of</tspan>
      <tspan x="616" dy="30">intelligence.</tspan>
    </text>

    <text x="112" y="446" font-size="24" font-weight="700">Acting Humanly</text>
    <text x="112" y="494" font-size="16" font-weight="400">
      <tspan x="112" dy="0">Building machines that behave in ways</tspan>
      <tspan x="112" dy="30">that appear intelligent when compared</tspan>
      <tspan x="112" dy="30">with how people would perform the same</tspan>
      <tspan x="112" dy="30">tasks.</tspan>
    </text>

    <text x="616" y="446" font-size="24" font-weight="700">Acting Rationally</text>
    <text x="616" y="494" font-size="16" font-weight="400">
      <tspan x="616" dy="0">Designing intelligent agents that choose</tspan>
      <tspan x="616" dy="30">actions expected to achieve good</tspan>
      <tspan x="616" dy="30">outcomes given what they perceive</tspan>
      <tspan x="616" dy="30">and know.</tspan>
    </text>
  </g>

  <text x="82" y="692" fill="#6F6559" font-family="Georgia, 'Times New Roman', serif" font-size="15">
    Adapted from Russell and Norvig, Artificial Intelligence: A Modern Approach.
  </text>
</svg>
